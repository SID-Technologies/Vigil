version: "2"

run:
  timeout: 5m
  go: "1.25.0"
  concurrency: 8

linters:
  default: all
  disable:
    - cyclop
    - depguard
    - err113
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gocognit
    - godox
    - godoclint
    - gomoddirectives
    - interfacebloat
    - intrange
    - ireturn
    - lll
    - mnd
    - prealloc
    - predeclared
    - tagliatelle
    - varnamelen
    - wsl
    - paralleltest
    - unqueryvet # Designed for SQLBoiler, not Ent ORM — false positives on every query

  settings:
    exhaustive:
      default-signifies-exhaustive: true
    forbidigo:
      forbid:
        - pattern: 'fmt\.Print.*(# Avoid debug logging)?'
        - pattern: 'fmt\.Errorf.*(# Prefer pkg/errors.Wrap)?'
    govet:
      enable-all: true
      disable:
        - fieldalignment
    misspell:
      locale: US
    nlreturn:
      block-size: 2
    nolintlint:
      require-explanation: true
      require-specific: true
    revive:
      severity: warning
      enable-all-rules: true
      rules:
        - name: file-header
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: banned-characters
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: function-length
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: argument-limit
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: imports-blocklist
          arguments:
            - log
            - errors
            - github.com/pkg/errors
            - github.com/stretchr/testify/assert
            - golang.org/x/exp/slices
            - golang.org/x/exp/maps
        - name: unhandled-error
          arguments:
            - fmt.Printf
            - fmt.Println
        - name: max-control-nesting
          arguments:
            - 10
    staticcheck:
      checks:
        - all

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
