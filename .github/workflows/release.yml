name: Release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0`). Creates a draft GitHub
# Release populated with the bundles produced on each platform runner.
#
# Required GitHub Secrets:
#
#   TAURI_SIGNING_PRIVATE_KEY              # Ed25519 signing key for the updater
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD     # passphrase for the above
#
#   APPLE_CERTIFICATE                      # base64-encoded .p12 of the Developer ID cert
#   APPLE_CERTIFICATE_PASSWORD             # password for the .p12
#   APPLE_SIGNING_IDENTITY                 # e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                               # Apple ID for notarytool
#   APPLE_PASSWORD                         # app-specific password (notarytool)
#   APPLE_TEAM_ID                          # 10-character team ID
#
#   WINDOWS_CERTIFICATE                    # base64 .pfx (or use Azure Trusted Signing)
#   WINDOWS_CERTIFICATE_PASSWORD           # .pfx password
#
# See CLAUDE.md for the runbook to provision these.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            sidecar-cmd: "make build-sidecar-darwin-universal"
          - platform: windows-latest
            args: ""
            sidecar-cmd: "bash scripts/build-sidecar.sh"
          - platform: ubuntu-22.04
            args: ""
            sidecar-cmd: "bash scripts/build-sidecar.sh"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Ent codegen
        run: |
          cd db/ent && go generate ./

      - name: Build sidecar
        shell: bash
        env:
          VIGIL_VERSION: ${{ github.ref_name }}
        run: ${{ matrix.sidecar-cmd }}

      - name: Build & sign desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # Windows code signing — leave blank if using Azure Trusted Signing instead
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Vigil ${{ github.ref_name }}"
          releaseBody: |
            See CHANGELOG.md for what's new.

            **macOS**: Download the .dmg, drag Vigil to /Applications, launch.
            First run on macOS will show a quarantine prompt — Gatekeeper checks
            against Apple's notarization service before opening.

            **Windows**: Download the .msi, run the installer, accept the
            SmartScreen warning if it appears (it shouldn't with EV signing,
            may with OV until reputation builds).

            **Linux**: `.AppImage` is the simplest — chmod +x, run. `.deb`
            for Ubuntu/Debian: `sudo dpkg -i vigil_*.deb`. ICMP probes use
            unprivileged ICMP sockets via `pro-bing`; if your distro hasn't
            set `net.ipv4.ping_group_range` (default on Ubuntu/Fedora), all
            users have access without sudo.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
