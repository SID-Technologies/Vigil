name: Release

# Pattern ported from Pugio/Statio's `publish_desktop_release.yml`,
# which has been validated end-to-end. Two macOS jobs (separate aarch64 +
# x86_64 bundles), Linux x64, Windows x64. The Vigil-specific addition is
# the Go sidecar build step on each platform — Pugio is pure JS/Rust.
#
# Trigger: workflow_dispatch with a bump choice. Auto-derives the next
# version from the latest `v*` tag, edits tauri.conf.json + Cargo.toml,
# commits, tags, builds, and finally flips the draft release to published.
#
# Required GitHub Secrets:
#
#   TAURI_SIGNING_PRIVATE_KEY              # Ed25519 signing key for the updater
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD     # passphrase for the above
#
#   APPLE_CERTIFICATE                      # base64-encoded .p12 of the Developer ID cert
#   APPLE_CERTIFICATE_PASSWORD             # password for the .p12
#   APPLE_SIGNING_IDENTITY                 # e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                               # Apple ID for notarytool
#   APPLE_PASSWORD                         # app-specific password (notarytool)
#   APPLE_TEAM_ID                          # 10-character team ID
#
#   WINDOWS_CERTIFICATE                    # base64 .pfx (or use Azure Trusted Signing)
#   WINDOWS_CERTIFICATE_PASSWORD           # .pfx password
#
# Apple/Windows secrets are optional — if unset, builds produce unsigned
# bundles. See CLAUDE.md for the runbook to provision them.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  # 1. Derive the next version from the latest tag.
  version:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.next.outputs.version }}
      tag: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(gh release list --limit 50 --json tagName --jq '.[].tagName' | grep '^v[0-9]' | head -1 || echo "")

          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"

          echo "Releasing ${TAG} (was ${CURRENT})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # 2. Bump tauri.conf.json + Cargo.toml, clean stale tag/release, then tag.
  tag:
    needs: version
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update version in tauri.conf.json
        run: |
          cd apps/desktop/src-tauri
          jq '.version = "${{ needs.version.outputs.version }}"' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json

      - name: Update version in Cargo.toml
        run: |
          cd apps/desktop/src-tauri
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' Cargo.toml

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/tauri.conf.json apps/desktop/src-tauri/Cargo.toml
          git commit -m "chore: bump desktop version to ${{ needs.version.outputs.version }}" || echo "No changes to commit"
          git push

      - name: Clean up stale tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Survive failed prior runs — delete remote tag, local tag, and any draft release.
          git push origin --delete ${{ needs.version.outputs.tag }} 2>/dev/null || true
          git tag -d ${{ needs.version.outputs.tag }} 2>/dev/null || true
          gh release delete ${{ needs.version.outputs.tag }} --yes 2>/dev/null || true

      - name: Create tag
        run: |
          git tag ${{ needs.version.outputs.tag }}
          git push origin ${{ needs.version.outputs.tag }}

  # 3. Build for all platforms in parallel. Each runner builds the Go sidecar
  # for its target triple, then runs tauri-action which produces signed bundles.
  build:
    needs: [version, tag]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            sidecar-cmd: "make build-sidecar-darwin-arm64"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            sidecar-cmd: "make build-sidecar-darwin-amd64"
          - platform: ubuntu-22.04
            args: ""
            sidecar-cmd: "bash scripts/build-sidecar.sh"
          - platform: windows-latest
            args: ""
            sidecar-cmd: "bash scripts/build-sidecar.sh"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Tauri 2 uses the ayatana fork. Do NOT also install the legacy
          # libappindicator3-dev — it conflicts with the ayatana package and
          # its required libappindicator3-1 version isn't in current archives.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Required for `tauri build --target ...` cross-arch on macOS.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./apps/desktop/src-tauri -> target"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Ent codegen
        shell: bash
        run: cd db/ent && go generate ./

      - name: Build sidecar
        shell: bash
        env:
          VIGIL_VERSION: ${{ needs.version.outputs.version }}
        run: ${{ matrix.sidecar-cmd }}

      # Conditionally export Apple signing env vars only when the cert secret
      # has a value. tauri-action would otherwise try to `security import` an
      # empty string and crash. This step is a no-op on non-macOS runners and
      # on macOS without secrets configured (i.e. unsigned beta builds).
      - name: Configure macOS code signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERT" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERT" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> "$GITHUB_ENV"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> "$GITHUB_ENV"
            echo "macOS signing: enabled"
          else
            echo "macOS signing: skipped (APPLE_CERTIFICATE not set — unsigned build)"
          fi

      - name: Build & sign desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key — required for tauri-plugin-updater to ship
          # signed manifests. Different from Apple/Windows code-signing certs.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_* vars are exported by the previous step when secrets exist.
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: "Vigil ${{ needs.version.outputs.tag }}"
          releaseBody: |
            ## Vigil ${{ needs.version.outputs.tag }}

            Download the installer for your platform from the assets below.

            **macOS**: separate Apple Silicon (`aarch64`) and Intel (`x64`) bundles.
            **Windows**: `.msi` installer.
            **Linux**: `.deb` for Debian/Ubuntu, `.AppImage` for everything else.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # 4. Flip the draft release to published once every platform succeeded.
  publish:
    needs: [version, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish release
        run: gh release edit ${{ needs.version.outputs.tag }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
