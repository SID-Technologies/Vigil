name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  go:
    name: Go (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run Ent codegen
        run: |
          cd db/ent && go generate ./

      - name: go vet
        run: go vet ./...

      - name: Build sidecar
        run: GOOS=linux GOARCH=amd64 bash scripts/build-sidecar.sh

      - name: Run tests
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  frontend:
    name: Frontend (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: cd apps/desktop && pnpm tsc --noEmit
